services:
  - type: web
    name: researchmind-backend
    env: python
    buildCommand: cd backend && pip install -r requirements.txt && python download_model.py
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: EMBEDDING_ENGINE
        value: openai
      - key: ALLOWED_ORIGINS
        value: "*"
